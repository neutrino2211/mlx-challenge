# QRK Tokenizer Config
# For mlx-pretrain: https://github.com/N8python/mlx-pretrain

tokenizer:
  # Output path
  output_dir: "tokenizer"
  
  # Vocabulary size - high for thought injection flexibility
  vocab_size: 32000
  
  # Training data
  data_path: "train.jsonl"
  
  # Special tokens - THE SECRET SAUCE
  special_tokens:
    - "<unk>"
    - "<s>"          # BOS
    - "</s>"         # EOS
    - "<pad>"
    # Thought Injection tokens
    - "<knowledge>"   # Model emits this to request knowledge
    - "</knowledge>"  # End of knowledge request
    - "<k_res>"       # Injected knowledge response marker
    - "<k_end>"       # End of injected knowledge
    # Code-specific tokens (for the challenge)
    - "<code>"
    - "</code>"
    - "<output>"
    - "</output>"
  
  # BPE settings
  min_frequency: 2
  
  # How many samples to train tokenizer on
  # More = better tokenizer, but slower
  num_samples: 50000
