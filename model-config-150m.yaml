# QRK 150M Model Config
# For 16GB Mac, ~8-12 hours for 100M tokens

name: "QRK-150M"
overwrite: true

data:
  input_file: "train.jsonl"
  validation_file: "val.jsonl"  # Optional
  tokenizer_path: "tokenizer"   # Directory containing tokenizer.json
  preprocessing:
    max_context_size: 1024
    chunk_overlap: 0

  tokenizer:
    normal_vocab_size: 256
    special_tokens:
      pad: "<pad>"
      bos: "<s>"
      eos: "</s>"
      # Thought injection tokens
      knowledge_start: "<knowledge>"
      knowledge_end: "</knowledge>"
      k_res: "<k_res>"
      k_end: "<k_end>"

model:
  architecture: "llama"
  dimensions:
    hidden_size: 1024
    intermediate_size: 2816  # ~2.75x hidden (SwiGLU)
    num_layers: 6            # Shallow but wider
  attention:
    num_heads: 16
    num_kv_heads: null       # Full attention at this scale
    head_dim: null
    max_position_embeddings: 1024
  normalization:
    rms_norm_eps: 1.0e-6
  rope:
    theta: 10000
    traditional: false
    scaling: null
  misc:
    attention_bias: false
    mlp_bias: false
    tie_word_embeddings: true

training:
  epochs: 1
  hyperparameters:
    batch_size: 4
    learning_rate: 3.0e-4
    weight_decay: 0.1
    gradient_accumulation: 8  # Effective batch = 32
    # iters: 25000  # Uncomment to use iterations instead of epochs

  scheduler:
    type: "cosine_with_warmup"
    min_lr_ratio: 0.1
    warmup_steps: 500

  optimization:
    optimizer: "adamw"

logging:
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
  steps:
    logging_interval: 50
    checkpoint_interval: 2500
    validation_interval: 1000

system:
  seed: 42
  device: "gpu"
