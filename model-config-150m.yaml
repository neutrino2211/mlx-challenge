# QRK 150M Model Config
# For mlx-pretrain on 16GB MBP
# Target: 100M tokens, ~8-12 hours

model:
  name: "QRK-150M"
  architecture: "llama"
  
  # Architecture params (~150M total)
  # High embedding ratio for thought injection
  hidden_size: 1024
  num_hidden_layers: 6          # Shallow but wider
  num_attention_heads: 16
  num_key_value_heads: 16       # Full attention (no GQA at this scale)
  intermediate_size: 2816       # ~2.75x hidden (SwiGLU)
  max_position_embeddings: 1024
  
  # Vocab from tokenizer
  vocab_size: 32000
  
  # Standard settings
  rms_norm_eps: 1.0e-6
  rope_theta: 10000.0
  tie_word_embeddings: true     # Save memory, share input/output embeddings

training:
  # Data
  data_path: "train.jsonl"
  val_data_path: "val.jsonl"    # Optional validation set
  
  # Tokenizer (trained separately)
  tokenizer_path: "tokenizer/tokenizer.json"
  
  hyperparameters:
    # Conservative for 16GB RAM
    batch_size: 4               # Small batch, accumulate gradients
    gradient_accumulation: 8    # Effective batch = 32
    learning_rate: 3.0e-4       # Standard for this scale
    min_learning_rate: 3.0e-5   # Cosine decay target
    weight_decay: 0.1
    warmup_steps: 500
    
    # Total training
    # 100M tokens / (4 batch * 1024 seq) ≈ 24,414 steps
    iters: 25000
    
    # Sequence length
    seq_length: 1024
    
    # Gradient clipping
    max_grad_norm: 1.0
  
  # Checkpointing
  save_every: 2500              # Save every ~10M tokens
  eval_every: 1000              # Validate every ~4M tokens
  log_every: 50
  
  # Output
  output_dir: "runs"

# Memory optimization for 16GB
optimization:
  # Use bfloat16 if M2/M3, float16 for M1
  dtype: "bfloat16"
  
  # Gradient checkpointing (trade compute for memory)
  gradient_checkpointing: true
